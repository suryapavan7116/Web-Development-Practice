<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card inside a Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h2>Outer Card</h2>
        <p>This is the outer card.</p>

        <div class="card inner-card">
            <h3>Inner Card</h3>
            <p>This is the inner card nested inside the outer card.</p>
        </div><br><br>
        <div class="card inner-card">
            <h3>Second Inner Card</h3>
            <p>This is the inner card nested inside the outer card.</p>
        </div>
    </div>

</body><br><br><br><br>

</html>
