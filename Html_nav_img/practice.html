<!DOCTYPE html>
<html>
<head>
  <title>HTML Graphics & API Practice</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #box {
      width: 100px;
      height: 100px;
      background: lightblue;
      margin: 10px auto;
    }

    #dropArea {
      width: 200px;
      height: 100px;
      border: 2px dashed black;
      margin: 10px auto;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>HTML Graphics & API Demo</h1>

<!-- ✅ SVG Graphics (No Quality Loss) -->
<h3>SVG Circle</h3>
<svg width="120" height="120">
  <circle cx="60" cy="60" r="50" fill="blue" />
</svg>

<!-- ✅ Canvas Graphics (Pixel Based Drawing) -->
<h3>Canvas Rectangle</h3>
<canvas id="myCanvas" width="200" height="100" style="border:1px solid black;"></canvas>

<script>
  const canvas = document.getElementById("myCanvas");
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "green";
  ctx.fillRect(20, 20, 150, 60);
</script>

<!-- ✅ Geolocation API -->
<h3>Get Your Location</h3>
<button onclick="getLocation()">Click for Location</button>
<p id="location"></p>

<script>
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      document.getElementById("location").innerHTML =
        "Latitude: " + position.coords.latitude +
        " | Longitude: " + position.coords.longitude;
    });
  } else {
    document.getElementById("location").innerHTML = "Geolocation not supported.";
  }
}
</script>

<!-- ✅ Web Storage API -->
<h3>Web Storage Example</h3>
<button onclick="saveData()">Save Name</button>

<script>
function saveData() {
  localStorage.setItem("name", "Surya");
  alert("Name saved in browser storage!");
}
</script>

<!-- ✅ Drag and Drop API -->
<h3>Drag and Drop</h3>
<div id="box" draggable="true" ondragstart="drag(event)">Drag Me</div>

<div id="dropArea" ondrop="drop(event)" ondragover="allowDrop(event)">
  Drop Here
</div>

<script>
function allowDrop(event) {
  event.preventDefault();
}

function drag(event) {
  event.dataTransfer.setData("text", event.target.id);
}

function drop(event) {
  event.preventDefault();
  const data = event.dataTransfer.getData("text");
  event.target.appendChild(document.getElementById(data));
}
</script>

</body>
</html>
